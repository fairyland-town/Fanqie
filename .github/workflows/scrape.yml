name: Daily Fanqie Rank Scraper

permissions:
  contents: write

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 触发
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动在界面上点击 Run workflow

jobs:
  scrape-and-commit:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Check if today's data exists
      id: check_data
      run: |
        TODAY=$(date -u +"%Y%m%d")
        FILE="data/fanqie_male_read_ranks_${TODAY}.json"
        if [ -f "$FILE" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "✅ 今日数据已存在: $FILE，跳过爬取"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "📭 今日数据不存在，将执行爬取"
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        if [ "${{ steps.check_data.outputs.exists }}" = "false" ]; then
          playwright install --with-deps chromium
        fi

    - name: Run Scraper
      if: steps.check_data.outputs.exists == 'false'
      run: python scrape_fanqie_ranks.py
      env:
        GITHUB_ACTIONS: true

    - name: Build Latest Data (no AI)
      run: python scripts/build_latest.py

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "[Auto] Update Fanqie daily ranks"
        file_pattern: data api
        branch: main
